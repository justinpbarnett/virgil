name: draft
description: Produces written content from input context and instructions.
category: comms
streaming: true
timeout: 3m
provider: claude
model: opus

triggers:
  exact:
    - "write something"
    - "draft this"
  keywords:
    - draft
    - compose
    - write
    - author
  patterns:
    - "draft {type}"
    - "write {type} about {topic}"
    - "draft {type} based on {source}"

flags:
  type:
    description: What kind of content to produce.
    values: [blog, email, pr, memo, spec]
    default: ""
  phase:
    description: Create new content or update existing. Only used by spec type.
    values: [create, update]
    default: create
  tone:
    description: Writing tone.
    values: [formal, casual, technical]
    default: ""
  length:
    description: Approximate output length.
    values: [short, medium, long]
    default: medium

memory:
  context:
    - type: user_preferences
    - type: topic_history
      depth: 7d
    - type: relational
      relations: [produced_by, refined_from, co_occurred]
  budget: 1500

vocabulary:
  verbs:
    draft: draft
    write: draft
    compose: draft
    summarize: draft
    summary: draft
    spec: draft
    specify: draft
  types:
    blog: blog
    email: email
    pr: pr
    memo: memo
    spec: spec
  sources: {}
  modifiers: {}

templates:
  priority: 50
  entries:
    - requires: [verb, type, source]
      plan:
        - pipe: "{source}"
          flags: { action: retrieve, sort: recent, limit: "10", topic: "{topic}" }
        - pipe: "{verb}"
          flags: { type: "{type}" }

    - requires: [verb, source, modifier]
      plan:
        - pipe: "{source}"
          flags: { range: "{modifier}" }
        - pipe: "{verb}"
          flags: { type: summary }

    - requires: [verb, type]
      plan:
        - pipe: "{verb}"
          flags: { type: "{type}", topic: "{topic}" }

    - requires: [verb, source]
      plan:
        - pipe: "{source}"
          flags: { action: retrieve }
        - pipe: "{verb}"
          flags: {}

    - requires: [verb]
      plan:
        - pipe: "{verb}"

prompts:
  system: |
    You are a professional writer. You produce clean, clear, well-structured
    content appropriate to the format requested. When given context material,
    you synthesize it — you don't just summarize. You match the user's tone
    and style preferences when provided.

  templates:
    blog: |
      Write a blog post based on the following material.

      Source material:
      {{.Content}}

      {{if .Topic}}Focus on: {{.Topic}}{{end}}
      {{if .Tone}}Tone: {{.Tone}}{{end}}
      {{if .Length}}Target length: {{.Length}}{{end}}

    email: |
      Draft an email based on the following context.

      Context:
      {{.Content}}

      {{if .Tone}}Tone: {{.Tone}}{{end}}

    pr: |
      Write a pull request description for the following changes.

      Changes:
      {{.Content}}

      Include: summary of what changed, why it changed, testing notes,
      and any migration steps if applicable.

    memo: |
      Write a memo based on the following material.

      Source material:
      {{.Content}}

      {{if .Topic}}Topic: {{.Topic}}{{end}}
      {{if .Tone}}Tone: {{.Tone}}{{end}}

    summary: |
      Summarize the following information clearly and concisely.
      Present the key points in a natural, readable format.

      Information:
      {{.Content}}

      {{if .Topic}}Focus on: {{.Topic}}{{end}}

    spec-create: |
      Create an implementation specification document from this analysis.

      Analysis:
      {{.Content}}

      {{if .CodebaseContext}}
      Codebase context:
      {{.CodebaseContext}}
      {{end}}

      Write for builders. No fluff, no motivation sections, no business
      justification. The document must include: Summary, Scope (in/out/boundary
      decisions), Architecture (approach, components, interfaces), Implementation
      Plan (ordered steps, file-level scope), Risks (with mitigations),
      Decisions (empty initially), Open Questions (each with why-it-matters
      and known options), and Acceptance Criteria (testable yes/no questions).

      Mark all open questions explicitly. Mark uncertain assumptions with [?].
      Implementation steps must be independently verifiable.

    spec-update: |
      Update this specification document with new analysis results.

      Current spec:
      {{.State}}

      New analysis (resolved questions, implications, updated risks):
      {{.Content}}

      Rules:
      - Move resolved questions from Open Questions to Decisions with rationale
      - Update affected sections (scope, implementation plan, risks)
      - Add any new open questions
      - Do not remove or modify decisions from previous rounds
      - If a new decision contradicts a previous one, flag it explicitly
      - Keep the document structure intact — update sections surgically
