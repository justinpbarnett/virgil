name: calendar
description: Reads events from calendar services.
category: time

triggers:
  exact:
    - "check my calendar"
    - "what's on my schedule"
    - "what's on my calendar"
  keywords:
    - calendar
    - schedule
    - meeting
    - event
    - appointment
  patterns:
    - "what's on my calendar {modifier}"
    - "check my calendar {modifier}"

flags:
  range:
    description: Time range to query.
    values: [today, tomorrow, this-week]
    default: today
  calendar:
    description: Which calendar to use.
    default: primary

format:
  list: |-
    {{if eq .Count 0}}Your calendar is clear.{{else}}You have {{.Count}} event{{if gt .Count 1}}s{{end}}{{if eq .Range "tomorrow"}} tomorrow{{else if eq .Range "this-week"}} this week{{else if eq .Range "next"}} coming up{{else}} today{{end}}:{{range .Items}}
    - {{.title}}{{if .time}} — {{.time}}{{end}}{{if .location}} ({{.location}}){{end}}{{end}}{{end}}

memory:
  disabled: true

vocabulary:
  verbs:
    show: calendar
  types: {}
  sources:
    calendar: calendar
  modifiers:
    next: next
    recent: recent
    today: today
    tomorrow: tomorrow
    "this week": this-week
