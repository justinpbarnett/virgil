name: todo
description: Manages a personal todo list — add, complete, edit, remove, reorder, and list tasks.
category: general

triggers:
  exact:
    - "show my todos"
    - "what's on my todo list"
    - "what do I need to do"
  keywords:
    - todo
    - task
    - todos
    - tasks
    - checklist
    - backlog
    - list
    - item
    - items
    - pending
    - action
  patterns:
    - "add {topic} to my todo list"
    - "add {topic} to my todos"
    - "mark {topic} as done"
    - "check off {topic}"
    - "remove {topic} from my todos"
    - "prioritize {topic}"
    - "reorder {topic}"
    - "show me {topic}"
    - "expand {topic}"
    - "details for {topic}"
    - "what is {topic}"

flags:
  action:
    description: Which todo operation to perform.
    values: [add, list, done, undone, remove, edit, reorder, detail]
    default: list
  title:
    description: The todo item title (for add action).
    default: ""
  id:
    description: Todo item ID (for done, remove, edit, reorder actions).
    default: ""
  priority:
    description: Priority level 1 (highest) to 5 (lowest).
    values: ["1", "2", "3", "4", "5"]
    default: "3"
  due:
    description: Due date (ISO 8601 date or natural language like "friday").
    default: ""
  tags:
    description: Comma-separated tags.
    default: ""
  status:
    description: Filter by status (for list action).
    values: [pending, done, all]
    default: pending
  limit:
    description: Maximum items to return (for list action).
    default: "25"
  details:
    description: Detailed context for the todo item (JIRA description, Slack thread, etc.).
    default: ""
  external_id:
    description: External reference ID for dedup (e.g., jira:PTP-123).
    default: ""

format:
  list: |-
    {{if eq .Count 0}}No todos.{{else}}{{.Count}} todo{{if gt .Count 1}}s{{end}}:{{range .Items}}
    {{if eq .status "done"}}- ~~{{.title}}~~{{else}}- {{.title}}{{end}}{{if .due_date}} — due {{.due_date}}{{end}} · p{{.priority}}{{end}}{{end}}
  structured: |-
    {{if eq .action "detail"}}{{.title}} · p{{.priority}} · {{.status}}{{if .due_date}} — due {{.due_date}}{{end}}{{if .external_id}}
    Source: {{.external_id}}{{end}}{{if .details}}

    {{.details}}{{else}}
    No details available.{{end}}{{else if eq .action "done"}}✓ Completed: {{.title}}{{else if eq .action "undone"}}↺ Restored: {{.title}}{{else if eq .action "remove"}}✗ Removed: {{.title}}{{else}}+ Added: {{.title}}{{end}}{{if and (ne .action "detail") (ne .action "remove") .due_date}} — due {{.due_date}}{{end}}{{if and (ne .action "detail") (ne .action "remove")}} · p{{.priority}}{{end}}

memory:
  disabled: true

vocabulary:
  verbs:
    todo: [todo]
    task: [todo]
    show: [todo]
    view: [todo.list]
    list: [todo.list]
    add: [todo.add]
    create: [todo.add]
    mark: [todo.done]
    complete: [todo.done]
    finish: [todo.done]
    done: [todo.done]
    check: [todo.done]
    uncheck: [todo.undone]
    undo: [todo.undone]
    restore: [todo.undone]
    remove: [todo.remove]
    delete: [todo.remove]
    drop: [todo.remove]
    rm: [todo.remove]
    prioritize: [todo.reorder]
    reorder: [todo.reorder]
    move: [todo.reorder]
    edit: [todo.edit]
    update: [todo.edit]
    change: [todo.edit]
    modify: [todo.edit]
    detail: [todo.detail]
    details: [todo.detail]
    expand: [todo.detail]
    describe: [todo.detail]
  types: {}
  sources:
    todos: [todo]
    tasks: [todo]
    checklist: [todo]
    backlog: [todo]
  modifiers: {}

templates:
  priority: 50
  entries:
    - requires: [verb]
      plan:
        - pipe: todo
