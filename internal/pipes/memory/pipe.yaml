name: memory
description: Explicitly stores, retrieves, and forgets information from local memory. For automatic context injection, pipes declare memory needs in pipe.yaml and the runtime satisfies them.
category: memory

triggers:
  exact:
    - "remember this"
    - "what do I know"
    - "forget this"
  keywords:
    - remember
    - recall
    - memory
    - notes
    - know
    - forget
    - log
    - history
    - lookup
  patterns:
    - "remember {topic}"
    - "recall {topic}"
    - "what do I know about {topic}"
    - "forget {topic}"

flags:
  action:
    description: Whether to store or retrieve.
    values: [store, retrieve, working-state]
    default: retrieve
  query:
    description: Search terms for retrieval.
    default: ""
  limit:
    description: Maximum results to return.
    default: "10"
  sort:
    description: Sort order for results.
    values: [recent, relevant]
    default: relevant
  key:
    description: Key for working state operations.
    default: ""
  namespace:
    description: Namespace for working state scoping.
    default: ""
  op:
    description: Working state sub-operation.
    values: [put, get, delete, list]
    default: get

format:
  list: |
    {{if eq .Count 0}}No memories found.{{else}}Found {{.Count}} memor{{if gt .Count 1}}ies{{else}}y{{end}}:{{range .Items}}
    - {{.content}}{{end}}{{end}}

vocabulary:
  verbs:
    remember: [memory.store]
    save: [memory.store]
    store: [memory.store]
    recall: [memory.retrieve]
    know: [memory.retrieve]
    lookup: [memory.retrieve]
    search: [memory.retrieve]
    forget: [memory]
  types: {}
  sources:
    notes: [memory]
    memory: [memory]
  modifiers: {}
