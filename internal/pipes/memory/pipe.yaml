name: memory
description: Stores and retrieves information from local memory.
category: memory

triggers:
  exact:
    - "remember this"
    - "what do I know"
  keywords:
    - remember
    - recall
    - memory
    - notes
    - know
    - forget
  patterns:
    - "remember {topic}"
    - "recall {topic}"
    - "what do I know about {topic}"

flags:
  action:
    description: Whether to store or retrieve.
    values: [store, retrieve, working-state]
    default: retrieve
  query:
    description: Search terms for retrieval.
    default: ""
  limit:
    description: Maximum results to return.
    default: "10"
  sort:
    description: Sort order for results.
    values: [recent, relevant]
    default: relevant
  key:
    description: Key for working state operations.
    default: ""
  namespace:
    description: Namespace for working state scoping.
    default: ""
  op:
    description: Working state sub-operation.
    values: [put, get, delete, list]
    default: get

format:
  list: |
    {{if eq .Count 0}}No memories found.{{else}}Found {{.Count}} memor{{if gt .Count 1}}ies{{else}}y{{end}}:{{range .Items}}
    - {{.content}}{{end}}{{end}}

vocabulary:
  verbs:
    remember: memory.store
    recall: memory.retrieve
    know: memory.retrieve
  types: {}
  sources:
    notes: memory
    memory: memory
  modifiers: {}
