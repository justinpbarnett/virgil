name: review
description: Reviews content against criteria and produces structured pass/fail findings.
category: dev
streaming: false
timeout: 90s
provider: claude
model: opus

triggers:
  exact:
    - "review this"
  keywords:
    - review
    - feedback
    - inspect
    - quality
  patterns:
    - "review {type}"
    - "review {source} against {topic}"

flags:
  criteria:
    description: What to evaluate against.
    values: [correctness, style, test-coverage, spec-compliance, dev-review, completeness]
    default: correctness

  strictness:
    description: How strict the review should be.
    values: [lenient, normal, strict]
    default: normal

  format:
    description: Output detail level.
    values: [summary, full]
    default: full

  source:
    description: Where to get content from. Empty uses envelope content. pr-diff fetches from GitHub.
    values: ["", pr-diff]
    default: ""

  pr:
    description: PR number or URL when source is pr-diff.
    default: ""

vocabulary:
  verbs:
    review: [review]
    evaluate: [review]
    audit: [review]
    critique: [review]
    inspect: [review]
  types:
    code: [code]
    spec: [spec]
    text: [text]
    pr: [pr]
  sources:
    pr-diff: [pr-diff]
    diff: [pr-diff]
    pr: [pr-diff]
  modifiers: {}

templates:
  priority: 40
  entries:
    - requires: [verb, source, topic]
      plan:
        - pipe: "{source}"
          flags: { action: retrieve, topic: "{topic}" }
        - pipe: "{verb}"
          flags: { criteria: spec-compliance }

    - requires: [verb, type]
      plan:
        - pipe: "{verb}"
          flags: { criteria: "{type}" }

    - requires: [verb]
      plan:
        - pipe: "{verb}"

format:
  structured: |
    {{if eq .outcome "pass"}}PASS{{else if eq .outcome "needs-revision"}}NEEDS REVISION{{else}}FAIL{{end}}: {{.summary}}{{if .findings}}
    {{range .findings}}
    [{{.severity}}] {{if .location}}{{.location}}: {{end}}{{.description}}{{if .suggestion}}
      → {{.suggestion}}{{end}}
    {{end}}{{end}}

prompts:
  system: |
    You are a precise, thorough reviewer. You evaluate content against
    specific criteria and produce structured assessments. You are direct
    about problems — you don't soften findings or hedge. When something
    passes, say so clearly. When something fails, explain exactly why
    and what to fix.

    You MUST respond with valid JSON matching this exact schema:

    {
      "outcome": "pass" | "fail" | "needs-revision",
      "summary": "one-sentence overall assessment",
      "findings": [
        {
          "severity": "error" | "warning" | "info",
          "location": "where in the content (line, section, function — whatever applies)",
          "description": "what the issue is",
          "suggestion": "how to fix it"
        }
      ]
    }

    Rules:
    - outcome is "fail" if ANY finding has severity "error"
    - outcome is "pass" if all findings are "warning" or "info" (or no findings)
    - outcome is "needs-revision" when issues exist that can be fixed without user input
    - "needs-revision" is only valid for the completeness criteria
    - findings array is always present, even if empty
    - location should be as specific as possible; use "" if not applicable
    - every error and warning MUST have a suggestion
    - info findings are observations, not problems — suggestions are optional
    - order findings by severity: errors first, then warnings, then info
    - respond ONLY with JSON — do NOT include any text outside the JSON object

  templates:
    correctness: |
      Review the following content for correctness.

      Check for: logical errors, incorrect assumptions, broken invariants,
      missing edge cases, undefined behavior, and factual inaccuracies.

      Content:
      {{.Content}}

      {{if .Topic}}Context: {{.Topic}}{{end}}

    style: |
      Review the following content for style and clarity.

      Check for: inconsistent naming, unclear structure, unnecessary complexity,
      missing documentation where non-obvious, dead code, and violations of
      the project's conventions.

      Content:
      {{.Content}}

      {{if .Topic}}Style guide or conventions: {{.Topic}}{{end}}

    test-coverage: |
      Review the following content for test coverage adequacy.

      Check for: untested code paths, missing edge case tests, missing error
      handling tests, brittle assertions, tests that don't actually verify
      behavior, and gaps between the implementation and its test suite.

      Content:
      {{.Content}}

      {{if .Topic}}Related tests or context: {{.Topic}}{{end}}

    spec-compliance: |
      Review the following content for compliance with the given specification.

      Check for: unimplemented requirements, deviations from the spec,
      missing acceptance criteria, and functionality that contradicts
      the spec.

      Content:
      {{.Content}}

      {{if .Topic}}Specification: {{.Topic}}{{end}}

    dev-review: |
      Review the following pull request diff for a feature implementation.

      Evaluate:
      - Architectural fit — is code in the right layers and packages?
      - Logic correctness — are there bugs, race conditions, or wrong assumptions?
      - Testing quality — are tests comprehensive, do they cover edge cases?
      - Style consistency — does new code match existing project conventions?
      - Security — are there injection risks, auth bypasses, or data leaks?

      PR Diff:
      {{.Content}}

      {{if .Topic}}Feature spec or context: {{.Topic}}{{end}}

      You MUST respond with valid JSON matching this exact schema:

      {
        "outcome": "pass" | "fail",
        "summary": "one-sentence overall assessment",
        "findings": [
          {
            "category": "architecture" | "logic" | "testing" | "style" | "security",
            "severity": "major" | "minor" | "nit",
            "file": "path/to/file",
            "line": 42,
            "issue": "what the issue is",
            "action": "what to do about it"
          }
        ]
      }

      Rules:
      - outcome is "fail" if ANY finding has severity "major"
      - outcome is "pass" if all findings are "minor" or "nit" (or no findings)
      - findings array is always present, even if empty
      - every major and minor finding MUST have an action
      - nit findings are style observations — actions are optional
      - order findings: major first, then minor, then nit
      - file paths must match exactly what appears in the diff
      - line numbers refer to the NEW file (post-change), not the old file
      - respond ONLY with JSON

    completeness: |
      Review this specification document for implementation readiness.

      This spec will be handed to a development pipeline that cannot ask
      clarifying questions. If the spec is ambiguous, the pipeline will
      guess wrong. Find the ambiguities.

      Spec:
      {{.Content}}

      {{if .Topic}}Additional context: {{.Topic}}{{end}}

      Check for:
      1. Open questions that are still unresolved
      2. Scope boundaries that are vague ("as needed", "if applicable",
         "where appropriate") — these MUST be resolved to concrete decisions
      3. Missing interface contracts (what goes in, what comes out)
      4. Implementation steps that skip details a developer would need
      5. Risks without mitigation strategies
      6. Acceptance criteria that aren't testable (subjective language
         like "should work well" or "performs adequately")
      7. Internal contradictions between sections
      8. Implicit assumptions that should be explicit

      Use outcome "pass" if the spec is ready for implementation.
      Use outcome "fail" if the spec needs answers from the user (unresolved
      open questions, missing requirements that only the user can provide).
      Use outcome "needs-revision" if the spec has fixable issues — vague
      language, missing details that can be inferred, structural problems
      — that don't require user input to resolve.

      For findings:
      - "error" severity for issues that would block implementation
      - "warning" for issues that could cause confusion or rework
      - "info" for suggestions that would improve clarity
