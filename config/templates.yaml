templates:
  - requires: [verb, type, source]
    plan:
      - pipe: "{source}"
        flags: { action: retrieve, sort: recent, limit: "10", topic: "{topic}" }
      - pipe: "{verb}"
        flags: { type: "{type}" }

  - requires: [verb, type]
    plan:
      - pipe: "{verb}"
        flags: { type: "{type}", topic: "{topic}" }

  - requires: [verb, source]
    plan:
      - pipe: "{source}"
        flags: { action: retrieve }

  - requires: [verb]
    plan:
      - pipe: "{verb}"
